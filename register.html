<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register-FinTrack Pro</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="page">
    <section class="card">
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Login to FinTrack Pro</p>
      <form class="form" action="#" method="post" autocomplete="on">
        <label class="field">
          <span class="label">Choose a Username</span>
          <input class="input" type="text" placeholder="Spaces are not allowed" id="usernameIdR" required onkeydown="return event.key !== ' '"/>
        </label>
        <label class="field">
          <span class="label">Password</span>
          <input class="input" type="password" placeholder="Spaces are not allowed"  id="passwordIdR" required onkeydown="return event.key !== ' '"/>
        </label>
        <button class="btnR" type="submit">Register</button>
        <p class="meta">
         Already have an account?
          <a class="link" href="./index.html">Login</a>
        </p>
      </form>
    </section>
  </main>

  <script type="module" src="./register.js"></script>
  </body>
</html>
