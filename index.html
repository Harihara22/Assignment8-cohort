<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-FinTrack Pro</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="page">
    <section class="card">
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Login to FinTrack Pro</p>
      <form class="form">
        <label class="field">
          <span class="label">Username</span>
          <input class="input" type="text" name="username" id="usernameId" placeholder="" required />
        </label>
        <label class="field">
          <span class="label">Password</span>
          <input class="input" type="password" id="passwordId" name="password" placeholder="" required />
        </label>
        <button class="btn" type="submit">Login</button>
        <p class="meta">
          Don't have an account?
          <a class="link" href="./register.html">Register here</a>
        </p>
      </form>
    </section>
  </main>

  <script type="module" src="./script.js"></script>
  </body>
</html>
